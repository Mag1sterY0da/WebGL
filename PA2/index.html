<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">


    <title>PA#1</title>
    <style>
        body {
            background-color: #EEEEEE;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>

    <script src="./Utils/trackball-rotator.js"></script>
    <script src="./Utils/m4.js"></script>
    <script src="./shader.gpu"></script>
    <script src="./main.js"></script>

</head>

<body onload="init()">
    <h2>Virich Cyclic Surface</h2>
    <label for="a">a</label>
    <input type="range" name="a" id="a" min="0" max="5" value="1.5" step="0.1" onchange="updSrf()">
    <label for="b">b</label>
    <input type="range" name="b" id="b" min="0" max="5" value="3" step="0.1" onchange="updSrf()">
    <label for="c">c</label>
    <input type="range" name="c" id="c" min="0" max="5" value="2" step="0.1" onchange="updSrf()">
    <label for="d">d</label>
    <input type="range" name="d" id="d" min="0" max="5" value="1" step="0.1" onchange="updSrf()">
    <label for="specular">specularity</label>
    <input type="range" name="specular" id="specular" min="1" max="100" value="80" step="1" onchange="draw()">
    <label for="diff">Set model's color</label>
    <input type="color" name="diff" id="diff" value="#00ee00" onchange="draw()">
    <label for="diff">Set light's color</label>
    <input type="color" name="spec" id="spec" value="#ffffff" onchange="draw()">
    <div id="canvas-holder">
        <canvas width="900" height="900" id="webglcanvas" style="background-color:red"></canvas>
    </div>
</body>

</html>
